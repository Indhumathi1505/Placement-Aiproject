# =====================================
# PlaceIQ — Spring Boot Configuration
# =====================================

server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/placeiq}
spring.data.mongodb.database=placeiq

# JWT
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_here_min_256_bits}

jwt.expiration=86400000

# Python AI Microservice URL
ai.service.url=${AI_SERVICE_URL:http://localhost:8001}


# File Upload (Resumes)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.placeiq=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS (for frontend dev/production server)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=indhumathirsj@gmail.com
spring.mail.password=Sasi@2006
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

