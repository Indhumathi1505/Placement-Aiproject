<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forgot Password — PlaceIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050A14;--surface:#0C1422;--card:#111E30;--border:#1E3048;
  --accent:#4F9EFF;--accent2:#7C6FF7;--accent3:#3DDCB2;
  --text:#E8F0FF;--muted:#7A95B5;--dim:#3D5472;
  --font-head:'Plus Jakarta Sans',sans-serif;--font-body:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;text-decoration:none;color:var(--text)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--font-head);font-size:14px;color:#fff}
.logo-text{font-family:var(--font-head);font-weight:800;font-size:18px}
.auth-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:32px;line-height:1.5}
.form-group{margin-bottom:24px}
label{display:block;font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:all .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,158,255,0.1)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:14px;color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,158,255,0.3)}
.btn-secondary{width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--muted);font-family:var(--font-body);font-size:14px;cursor:pointer;margin-top:12px;transition:all .2s}
.btn-secondary:hover{border-color:var(--dim);color:var(--text)}
.alert{background:rgba(255,100,100,0.08);border:1px solid rgba(255,100,100,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#FF7B7B;margin-bottom:16px;display:none}
.success-msg{background:rgba(61,220,178,0.08);border:1px solid rgba(61,220,178,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--accent3);margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="auth-box">
  <a href="login.html" class="logo">
    <div class="logo-mark">P</div>
    <div class="logo-text">PlaceIQ</div>
  </a>
  <h2 class="auth-title">Forgot Password?</h2>
  <p class="auth-sub">Enter your registered email and we'll send you a link to reset your password.</p>
  
  <div class="alert" id="alert"></div>
  <div class="success-msg" id="success">Reset link sent! Please check your email inbox and spam folder.</div>

  <form id="forgot-form" onsubmit="handleForgot(event)">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@college.edu" required/>
    </div>
    <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
  </form>
  
  <button class="btn-secondary" onclick="window.location='login.html'">Back to Login</button>
</div>

<script src="js/api-config.js"></script>
<script>
async function handleForgot(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('submitBtn');
  const alert = document.getElementById('alert');
  const success = document.getElementById('success');
  
  btn.textContent = 'Sending...';
  btn.disabled = true;
  alert.style.display = 'none';
  success.style.display = 'none';
  
  try {
    const resp = await fetch(window.PLACE_IQ_API_URL + '/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    if(!resp.ok) {
      const err = await resp.json();
      throw new Error(err.message || 'Failed to send reset link');
    }
    
    success.style.display = 'block';
    document.getElementById('forgot-form').reset();
  } catch (err) {
    alert.textContent = err.message;
    alert.style.display = 'block';
  } finally {
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
