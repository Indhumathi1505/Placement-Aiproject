<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — PlaceIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050A14;--surface:#0C1422;--card:#111E30;--border:#1E3048;
  --accent:#4F9EFF;--accent2:#7C6FF7;--accent3:#3DDCB2;
  --text:#E8F0FF;--muted:#7A95B5;--dim:#3D5472;
  --font-head:'Plus Jakarta Sans',sans-serif;--font-body:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.auth-box{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;position:relative;z-index:1}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;text-decoration:none;color:var(--text)}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-family:var(--font-head);font-size:14px;color:#fff}
.logo-text{font-family:var(--font-head);font-weight:800;font-size:18px}
.auth-title{font-family:var(--font-head);font-size:24px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:32px;line-height:1.5}
.form-group{margin-bottom:20px}
label{display:block;font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:all .2s}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,158,255,0.1)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;padding:14px;color:#fff;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:12px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(79,158,255,0.3)}
.pass-msg{font-size:11px;margin-top:4px;display:none;align-items:center;gap:4px}
.pass-msg.show{display:flex}
.pass-msg.error{color:#FF6B6B}
.pass-msg.success{color:var(--accent3)}
.strength-meter{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;display:none}
.strength-meter.show{display:block}
.strength-fill{height:100%;width:0;transition:all .3s}
.alert{background:rgba(255,100,100,0.08);border:1px solid rgba(255,100,100,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#FF7B7B;margin-bottom:16px;display:none}
.success-overlay{display:none;position:fixed;inset:0;background:rgba(5,10,20,0.95);z-index:200;align-items:center;justify-content:center;flex-direction:column;text-align:center}
.success-overlay.show{display:flex}
.success-icon{font-size:64px;margin-bottom:16px}
</style>
</head>
<body>
<div class="auth-box">
  <div class="logo">
    <div class="logo-mark">P</div>
    <div class="logo-text">PlaceIQ</div>
  </div>
  <h2 class="auth-title">Reset Password</h2>
  <p class="auth-sub">Enter your new strong password below.</p>
  
  <div class="alert" id="alert"></div>

  <form id="reset-form" onsubmit="handleReset(event)">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="pass" placeholder="At least 8 chars, uppercase, num, symbol" required oninput="checkStrength(this.value)"/>
      <div class="strength-meter" id="strength-meter"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="pass-msg" id="pass-msg">Must contain uppercase, number, and special char (!@#$%)</div>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" id="pass2" placeholder="Repeat your new password" required/>
    </div>
    <button type="submit" class="btn-primary" id="resetBtn">Update Password</button>
  </form>
</div>

<div class="success-overlay" id="success">
  <div class="success-icon">✨</div>
  <h2 style="font-family:var(--font-head);margin-bottom:8px">Password Updated</h2>
  <p style="color:var(--muted);margin-bottom:24px">You can now sign in with your new password.</p>
  <button class="btn-primary" style="max-width:200px" onclick="window.location='login.html'">Sign In Now</button>
</div>

<script src="js/api-config.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if(!token) {
  document.getElementById('alert').textContent = 'Invalid or missing reset token. Please request a new link.';
  document.getElementById('alert').style.display = 'block';
  document.getElementById('reset-form').style.display = 'none';
}

function checkStrength(p) {
  const meter = document.getElementById('strength-meter');
  const fill = document.getElementById('strength-fill');
  const msg = document.getElementById('pass-msg');
  if(!p) { meter.classList.remove('show'); msg.classList.remove('show'); return; }
  meter.classList.add('show'); msg.classList.add('show');
  let score = 0;
  if(p.length >= 8) score++;
  if(/[A-Z]/.test(p)) score++;
  if(/[0-9]/.test(p)) score++;
  if(/[!@#$%^&*(),.?":{}|<>]/.test(p)) score++;
  const colors = ['#FF6B6B', '#FFB347', '#4F9EFF', '#3DDCB2'];
  fill.style.width = (score / 4 * 100) + '%';
  fill.style.background = colors[score-1] || colors[0];
  if(score === 4) { msg.textContent = 'Strong password! ✨'; msg.className = 'pass-msg show success'; }
  else { msg.textContent = 'Must contain uppercase, number, and special char (!@#$%)'; msg.className = 'pass-msg show error'; }
}

async function handleReset(e) {
  e.preventDefault();
  const pass = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const btn = document.getElementById('resetBtn');
  const alert = document.getElementById('alert');
  
  if(pass !== pass2) { alert.textContent = 'Passwords do not match'; alert.style.display = 'block'; return; }
  
  btn.textContent = 'Updating...';
  btn.disabled = true;
  alert.style.display = 'none';
  
  try {
    const resp = await fetch(window.PLACE_IQ_API_URL + '/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass })
    });
    
    if(!resp.ok) {
      const err = await resp.json();
      throw new Error(err.message || 'Failed to update password');
    }
    
    document.getElementById('success').classList.add('show');
  } catch (err) {
    alert.textContent = err.message;
    alert.style.display = 'block';
  } finally {
    btn.textContent = 'Update Password';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
